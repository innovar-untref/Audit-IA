<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Audit-IA | Auditoría Pedagógica Innovar UNTREF</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --untref-blue: #003366; --accent-green: #2e7d32; --accent-red: #c62828; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 40px; border-top: 10px solid var(--untref-blue); box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .workflow { display: flex; justify-content: space-around; margin-bottom: 30px; font-weight: bold; color: var(--untref-blue); border-bottom: 1px solid #ddd; padding-bottom: 15px; }
        .field { margin-top: 20px; padding: 20px; border: 1px solid #ddd; border-radius: 5px; }
        
        /* Contenedores con colores institucionales */
        .negro { border-left: 10px solid #000; }
        .verde { border-left: 10px solid var(--accent-green); }
        .rojo { border-left: 10px solid var(--accent-red); }
        
        textarea, select, input { width: 100%; padding: 12px; margin-top: 8px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background: var(--untref-blue); color: white; padding: 15px; border: none; width: 100%; cursor: pointer; font-weight: bold; margin-top: 20px; }
        .result-card { margin-top: 30px; padding: 20px; border: 1px solid #ddd; }
    </style>
</head>
<body>

<div class="container">
    <div class="workflow">
        <span>1. RELATORÍA</span> ➔ <span>2. AUDITORÍA (Audit-IA)</span> ➔ <span>3. VALIDACIÓN</span>
    </div>

    <h1>Audit-IA | Auditoría Pedagógica</h1>
    <p>Protocolo para el uso transparente y ético de la IA (Basado en criterios CRITERIA y protocolos universitarios).</p>

    <div class="field">
        <label>Título de la Relatoría:</label>
        <input type="text" id="titulo">
        
        <label>Modelo IA utilizado:</label>
        <select id="modelo">
            <option value="GPT-4o">GPT-4o</option><option value="Gemini-1.5-Pro">Gemini 1.5 Pro</option>
            <option value="Claude-3.5-Sonnet">Claude 3.5 Sonnet</option>
            <option value="Perplexity">Perplexity</option><option value="DeepSeek-R1">DeepSeek R1</option>
        </select>
    </div>

    <div class="field negro">
        <label>Idea Central / Hipótesis (Negro - Autoría Propia):</label>
        <p><small>La IA debe ser un asistente, no un sustituto. Escribe aquí tu reflexión original.</small></p>
        <textarea id="negro" rows="3"></textarea>
    </div>

    <div class="field verde">
        <label>Catalizador Ético (Verde - Ideas adaptadas):</label>
        <textarea id="verde" rows="3" placeholder="¿Qué ideas específicas tomaste de la IA y cómo las complementaste/adaptaste a tu pensamiento ético profesional?"></textarea>
    </div>

    <div class="field">
        <label>Contenedor de Prompt (¿Qué le pediste a la IA?):</label>
        <textarea id="prompt" rows="2" placeholder="Pega aquí el prompt que le enviaste a la IA..."></textarea>
    </div>

    <div class="field rojo">
        <label>Auditoría Crítica de la IA (Rojo - Output íntegro):</label>
        <textarea id="rojo" rows="4" placeholder="Pega aquí exactamente lo que la IA te devolvió. Analiza sus sesgos y alucinaciones."></textarea>
    </div>
