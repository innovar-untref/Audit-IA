<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Audit-IA | Auditoría Pedagógica UNTREF</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Audit-IA | Auditoría Pedagógica</h1>
        <p>Protocolo de integridad para Innovar UNTREF: transparencia y trazabilidad son valores éticos.</p>
        
        <input type="text" id="titulo" placeholder="Título de la Relatoría">
        <div class="field negro"><textarea id="negro" rows="3" placeholder="Idea Central (Propia). Autoría implica responsabilidad."></textarea></div>
        <div class="field verde"><textarea id="verde" rows="3" placeholder="Catalizador Ético. ¿Cómo adaptaste las ideas de la IA mediante tu juicio crítico?."></textarea></div>
        <div class="field"><textarea id="prompt" rows="2" placeholder="Prompt original. La transparencia permite la replicabilidad."></textarea></div>
        <div class="field rojo"><textarea id="rojo" rows="5" placeholder="Auditoría Crítica (Output íntegro). Audita alucinaciones y sesgos."></textarea></div>
        
        <button onclick="auditar()">Validar Integridad Académica</button>
        <div id="dashboard" style="display:none;">
            <canvas id="myChart"></canvas>
            <div id="qr-container"></div>
        </div>
    </div>
    <script src="audit-logic.js"></script>
    <script src="script.js"></script>
</body>
</html>
