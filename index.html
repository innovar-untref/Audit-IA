<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Audit-IA | Innovar UNTREF</title>
    <link rel="stylesheet" href="style.css"> <!-- Puedes crear este archivo -->
    <script src="audit-logic.js"></script>
</head>
<body>
    <div class="workflow">
        <span>RELATORÍA</span> ➔ <span>AUDITORÍA (Audit-IA)</span> ➔ <span>VALIDACIÓN FINAL</span>
    </div>

    <div class="card">
        <h1>Audit-IA: Relatoría Interactiva</h1>
        
        <!-- Selección de Origen y Modelo -->
        <label>Origen del recurso y Modelo:</label>
        <select id="origen"><option value="Institucional">Institucional</option><option value="Externo">Externo</option></select>
        <input type="text" id="modelo" placeholder="Nombre del Modelo (Ej: Gemini, Claude)">

        <!-- Estructura de Relatoría -->
        <h3>1. Relatoría Argumentativa</h3>
        
        <label class="label-negro">Negro: Idea Central e Hipótesis (Autoría Propia)</label>
        <textarea id="negro"></textarea>

        <label class="label-verde">Verde: Catalizador Ético (Ideas adaptadas de IA a tu pensamiento)</label>
        <textarea id="verde" placeholder="Explica cómo tomaste una idea de la IA y la transformaste mediante tu ética profesional en algo nuevo..."></textarea>

        <label class="label-rojo">Rojo: Auditoría Crítica de la IA</label>
        <textarea id="rojo" placeholder="Copia la respuesta de la IA y audita sus sesgos/errores..."></textarea>

        <button onclick="ejecutarAuditoria()">Ejecutar Auditoría</button>
    </div>

    <div id="output"></div>

    <script>
        function ejecutarAuditoria() {
            const data = {
                negro: document.getElementById('negro').value,
                verde: document.getElementById('verde').value,
                rojo: document.getElementById('rojo').value,
                modelo: document.getElementById('modelo').value,
                origen: document.getElementById('origen').value
            };

            const resultado = procesarRelatoria(data);
            document.getElementById('output').innerHTML = `
                <div class="card">
                    <h2>Estado: ${resultado.estado}</h2>
                    <p>${resultado.feedback}</p>
                    <pre>
Prompt Antifrágil: "Analiza mi tesis [${data.negro.substring(0,30)}...]
que fue catalizada por [${data.verde.substring(0,30)}...] 
y auditada críticamente frente a ${data.modelo}. 
¿Qué debilidades lógicas persisten?"
                    </pre>
                </div>
            `;
        }
    </script>
</body>
</html>
